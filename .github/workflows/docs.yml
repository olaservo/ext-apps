name: Deploy Documentation

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "plugins/mcp-apps/skills/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run docs
      - uses: agentskills/build-for-well-known@v1
        with:
          skills: ./plugins/mcp-apps/skills
          output: ./docs/.well-known/agent-skills
      # Jekyll silently drops directories starting with "."
      - run: touch ./docs/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true
          cname: apps.extensions.modelcontextprotocol.io
